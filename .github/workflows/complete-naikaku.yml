name: complete-naikaku
on:
  workflow_dispatch:
    inputs:
      seed:
        description: any 件名 id of the simbn (e.g. 4916430)
        required: true
      req:
        description: req_no with part prefix (e.g. 子303-0002)
        required: true
      cat:
        description: category code (e.g. 303)
        required: true
      name:
        description: 書名 (e.g. 醫方類聚)
        required: true
      part:
        description: part (e.g. 子部)
        default: "子部"
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvips42 libvips-tools
          pip install -q pyvips boto3 requests pillow opencc
      - name: clone priv
        env:
          P: ${{ secrets.P }}
        run: git clone --depth 1 --quiet https://x-access-token:${P}@github.com/hosonzuo8848/harvester-priv.git _p
      - name: enumerate live 件名 -> validated worklist
        env:
          EDGE_PROXY: https://naikaku-dl.hosonzuo.workers.dev/fetch?url=
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_KEY: ${{ secrets.R2_KEY }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
          LIST_BUCKET: ${{ secrets.LIST_BUCKET }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          CF_D1_DB: ${{ secrets.CF_D1_DB }}
          CF_D1_TOKEN: ${{ secrets.CF_D1_TOKEN }}
        run: >
          python _p/enum_naikaku.py
          "${{ github.event.inputs.seed }}"
          "${{ github.event.inputs.req }}"
          "${{ github.event.inputs.part }}"
          "${{ github.event.inputs.cat }}"
          "日本·國立公文書館"
          "${{ github.event.inputs.name }}"
          "_worklist/_complete_${{ github.event.inputs.seed }}.csv"
      - name: download missing volumes (naikaku-zip stable)
        env:
          EDGE_PROXY: https://naikaku-dl.hosonzuo.workers.dev/fetch?url=
          NAIKAKU_ZIP: https://naikaku-zip.hosonzuo.workers.dev
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_KEY: ${{ secrets.R2_KEY }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          CF_D1_DB: ${{ secrets.CF_D1_DB }}
          CF_D1_TOKEN: ${{ secrets.CF_D1_TOKEN }}
          LIST_BUCKET: ${{ secrets.LIST_BUCKET }}
          DST_BUCKET: guyaofang-lib
          DST_GUJI_BUCKET: guji-sea
          PAGE_WORKERS: "4"
        run: >
          python _p/hv.py --source naikaku --shard 0 --total 1
          --list-key "_worklist/_complete_${{ github.event.inputs.seed }}.csv"
