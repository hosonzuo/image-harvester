name: harvest-naikaku-domain
on:
  workflow_dispatch:
    inputs:
      total:
        description: number of shards
        default: "4"
      limit:
        description: books per shard (0=all)
        default: "3"
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard: [0,1,2,3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: deps
        run: pip install -q requests pillow img2pdf
      - name: harvest shard
        env:
          DOMAIN_POOL: "1.1fz.dpdns.org,2.1fz.dpdns.org,3.1fz.dpdns.org,4.1fz.dpdns.org,5.1fz.dpdns.org,6.1fz.dpdns.org,7.1fz.dpdns.org,8.1fz.dpdns.org,9.1fz.dpdns.org,10.1fz.dpdns.org,11.1fz.dpdns.org,12.1fz.dpdns.org,13.1fz.dpdns.org,14.1fz.dpdns.org,15.1fz.dpdns.org,16.1fz.dpdns.org,17.1fz.dpdns.org,18.1fz.dpdns.org,19.1fz.dpdns.org,20.1fz.dpdns.org,21.1fz.dpdns.org,22.1fz.dpdns.org,23.1fz.dpdns.org,24.1fz.dpdns.org,25.1fz.dpdns.org,26.1fz.dpdns.org,27.1fz.dpdns.org,28.1fz.dpdns.org,29.1fz.dpdns.org,30.1fz.dpdns.org,2.bnp.indevs.in,3.bnp.indevs.in,4.bnp.indevs.in,2.freezz.dpdns.org,3.freezz.dpdns.org,4.freezz.dpdns.org,1.far.indevs.in"
        run: python harvest_naikaku_domain.py --worklist worklist_naikaku_domain.csv --shard ${{ matrix.shard }} --total ${{ github.event.inputs.total || '4' }} --out out --limit ${{ github.event.inputs.limit || '3' }}
      - name: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naikaku-domain-shard-${{ matrix.shard }}
          path: out/
          retention-days: 7
          if-no-files-found: ignore
